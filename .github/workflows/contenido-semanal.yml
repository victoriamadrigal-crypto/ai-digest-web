name: Contenido Semanal IA

on:
  schedule:
    - cron: "30 7 * * 1"
  workflow_dispatch:

jobs:
  generar-contenido:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Instalar dependencias
        run: pip install --no-cache-dir requests

      - name: Generar reto semanal
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generar_reto.py

      - name: Generar tip y lecciones extra
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generar_contenido.py

      - name: Guardar archivos en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reto-semanal.json contenido-semanal.json historico-lecciones.json
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: contenido semanal $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
