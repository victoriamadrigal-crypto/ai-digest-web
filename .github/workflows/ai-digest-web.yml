name: AI Digest Web

on:
  schedule:
    # Lunes a viernes a las 7:00 UTC (9:00 Madrid verano / 8:00 invierno)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Instalar dependencias
        run: pip install --no-cache-dir -r requirements.txt

      - name: Ejecutar bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python digest.py

      - name: Guardar seen_urls.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json
          if git diff --staged --quiet; then
            echo "Sin cambios en seen_urls.json"
          else
            git commit -m "chore: actualizar seen_urls.json [skip ci]"
            git push
          fi

      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
